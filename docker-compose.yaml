name: erpnext

services:
  backend:
    container_name: ${COMPOSE_PROJECT_NAME}-backend
    image: frappe/erpnext:v16.17.0
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    environment:
      DB_HOST: $DB_HOST
      DB_PORT: $DB_PORT
      MYSQL_ROOT_PASSWORD: $DB_PASSWORD
      MARIADB_ROOT_PASSWORD: $DB_PASSWORD

  configurator:
    container_name: ${COMPOSE_PROJECT_NAME}-configurator
    image: frappe/erpnext:v16.17.0
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: none
    entrypoint:
      - bash
      - -c
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: $DB_HOST
      DB_PORT: $DB_PORT
      REDIS_CACHE: ${COMPOSE_PROJECT_NAME}-redis-cache:6379
      REDIS_QUEUE: ${COMPOSE_PROJECT_NAME}-redis-queue:6379
      SOCKETIO_PORT: "9000"
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs

  create-site:
    container_name: ${COMPOSE_PROJECT_NAME}-create-site
    image: frappe/erpnext:v16.17.0
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: none
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    entrypoint:
      - bash
      - -c
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 ${COMPOSE_PROJECT_NAME}-redis-cache:6379;
        wait-for-it -t 120 ${COMPOSE_PROJECT_NAME}-redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=$DB_PASSWORD --db-root-username=root --db-root-password=$DB_PASSWORD --install-app erpnext --set-default frontend;

  db:
    container_name: ${COMPOSE_PROJECT_NAME}-db
    image: mariadb:11.8
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 5s
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: $DB_PASSWORD
      MARIADB_ROOT_PASSWORD: $DB_PASSWORD
    volumes:
      - erpnext_db_data:/var/lib/mysql

  frontend:
    container_name: ${COMPOSE_PROJECT_NAME}-frontend
    image: frappe/erpnext:v16.17.0
    networks:
      - frappe_network
      - iancookxyz
    depends_on:
      - websocket
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      FRAPPE_SITE_NAME_HEADER: frontend
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: 120
      CLIENT_MAX_BODY_SIZE: 50m
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    ports:
      - "18080:8080"

  queue-long:
    container_name: ${COMPOSE_PROJECT_NAME}-queue-long
    image: frappe/erpnext:v16.17.0
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - worker
      - --queue
      - long,default,short
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://${COMPOSE_PROJECT_NAME}-redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://${COMPOSE_PROJECT_NAME}-redis-queue:6379

  queue-short:
    container_name: ${COMPOSE_PROJECT_NAME}-queue-short
    image: frappe/erpnext:v16.17.0
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - worker
      - --queue
      - short,default
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    environment:
      FRAPPE_REDIS_CACHE: redis://${COMPOSE_PROJECT_NAME}-redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://${COMPOSE_PROJECT_NAME}-redis-queue:6379

  redis-queue:
    container_name: ${COMPOSE_PROJECT_NAME}-redis-queue
    image: redis:alpine
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - erpnext_redis_queue_data:/data

  redis-cache:
    container_name: ${COMPOSE_PROJECT_NAME}-redis-cache
    image: redis:alpine
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure

  scheduler:
    container_name: ${COMPOSE_PROJECT_NAME}-scheduler
    image: frappe/erpnext:v16.17.0
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - bench
      - schedule
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs

  websocket:
    container_name: ${COMPOSE_PROJECT_NAME}-websocket
    image: frappe/erpnext:v16.17.0
    networks:
      - frappe_network
    deploy:
      restart_policy:
        condition: on-failure
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      FRAPPE_REDIS_CACHE: redis://${COMPOSE_PROJECT_NAME}-redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://${COMPOSE_PROJECT_NAME}-redis-queue:6379
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs

volumes:
  erpnext_db_data:
    external: true
  erpnext_redis_queue_data:
    external: true
  erpnext_sites:
    external: true
  erpnext_logs:
    external: true

networks:
  frappe_network:
    driver: bridge
  iancookxyz:
    name: iancookxyz
    external: true
